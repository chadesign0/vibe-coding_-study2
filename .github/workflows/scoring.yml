name: Run Scoring

on:
  workflow_dispatch:
    inputs:
      task_id:
        description: 'Render에서 발급한 task_id (진행상황 webhook 식별)'
        required: true
      hospital_name:
        description: '병원명 (예: 포인트병원)'
        required: true
      month_label:
        description: '월 라벨 (예: 4월)'
        required: true
      config_name:
        description: 'config 폴더 내 runtime config 파일명'
        required: true
      webhook_url:
        description: 'Render 진행상황 webhook URL (예: https://baejeompyojadonghwa.onrender.com/api/webhook/score-progress)'
        required: true
      full_rescore:
        description: '전체 재채점 여부 (1/0)'
        required: false
        default: '1'

permissions:
  contents: write

concurrency:
  group: scoring-${{ inputs.hospital_name }}-${{ inputs.month_label }}
  cancel-in-progress: false

jobs:
  rescore:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: 1. 저장소 체크아웃 (최신 main)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: 2. Python 환경 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 3. 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 4. 시작 webhook 통지
        run: |
          curl -sS -X POST "${{ inputs.webhook_url }}" \
            -H "Content-Type: application/json" \
            -H "X-Webhook-Secret: ${{ secrets.WEBHOOK_SECRET }}" \
            -d "{\"taskId\":\"${{ inputs.task_id }}\",\"status\":\"running\",\"message\":\"GitHub Actions 채점 시작\",\"runId\":\"${{ github.run_id }}\"}" || true

      - name: 5. 채점 실행 (build_month.py)
        env:
          SCORING_CONFIG: ${{ inputs.config_name }}
          SCORING_FULL_RESCORE: ${{ inputs.full_rescore }}
          SCORING_TASK_ID: ${{ inputs.task_id }}
          SCORING_WEBHOOK_URL: ${{ inputs.webhook_url }}
          SCORING_WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          SCORING_VERIFY_SAMPLE: ${{ vars.SCORING_VERIFY_SAMPLE || '1' }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          NAVER_AD_API_KEY: ${{ secrets.NAVER_AD_API_KEY }}
          NAVER_AD_SECRET_KEY: ${{ secrets.NAVER_AD_SECRET_KEY }}
          NAVER_AD_CUSTOMER_ID: ${{ secrets.NAVER_AD_CUSTOMER_ID }}
        run: |
          python scripts/build_month.py | tee /tmp/scoring.log
          echo "QUALITY_LINE=$(grep -oE 'QUALITY_GATE:[A-Z]+:[0-9.]+' /tmp/scoring.log | tail -n1)" >> $GITHUB_ENV

      - name: 6. 채점 결과 커밋·푸시
        run: |
          set -e
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add data/scoring-data.json data/last-run-evidence.json 2>/dev/null || true

          if git diff --staged --quiet; then
            echo "변경된 채점 결과가 없습니다."
            exit 0
          fi

          git commit -m "auto: GitHub Actions 채점 결과 업데이트 ($(date -u +'%Y-%m-%d %H:%M UTC'))"

          for i in 1 2 3 4 5; do
            echo "::group::Push attempt $i/5"
            git fetch origin main
            if ! git pull --rebase -X ours origin main; then
              echo "Rebase 충돌 발생 - 정리 후 재시도"
              git rebase --abort || true
              sleep $((i * 5))
              echo "::endgroup::"
              continue
            fi
            if git push origin main; then
              echo "Push 성공 (시도 $i회)"
              echo "::endgroup::"
              exit 0
            fi
            echo "Push 실패 - $((i * 5))초 대기 후 재시도"
            sleep $((i * 5))
            echo "::endgroup::"
          done

          echo "5회 시도 후에도 push 실패. 수동 확인 필요."
          exit 1

      - name: 7. Render 데이터 새로고침 요청 (task_id 무관)
        if: success()
        run: |
          RENDER_BASE=$(echo "${{ inputs.webhook_url }}" | grep -oP '^https://[^/]+')
          curl -sS -X POST "${RENDER_BASE}/api/pull-scoring-data" \
            -H "X-Webhook-Secret: ${{ secrets.WEBHOOK_SECRET }}" || true

      - name: 8. 완료 webhook 통지
        if: success()
        run: |
          curl -sS -X POST "${{ inputs.webhook_url }}" \
            -H "Content-Type: application/json" \
            -H "X-Webhook-Secret: ${{ secrets.WEBHOOK_SECRET }}" \
            -d "{\"taskId\":\"${{ inputs.task_id }}\",\"status\":\"succeeded\",\"message\":\"${{ inputs.hospital_name }} · ${{ inputs.month_label }} 채점 완료\",\"quality\":\"${QUALITY_LINE}\",\"runId\":\"${{ github.run_id }}\"}" || true

      - name: 9. 실패 webhook 통지
        if: failure()
        run: |
          curl -sS -X POST "${{ inputs.webhook_url }}" \
            -H "Content-Type: application/json" \
            -H "X-Webhook-Secret: ${{ secrets.WEBHOOK_SECRET }}" \
            -d "{\"taskId\":\"${{ inputs.task_id }}\",\"status\":\"failed\",\"message\":\"GitHub Actions 채점 실패 (run #${{ github.run_id }})\",\"runId\":\"${{ github.run_id }}\"}" || true
